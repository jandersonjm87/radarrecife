# ============================================================
#  docker-compose.yml
#  Radar Recife — ambiente de desenvolvimento local.
#
#  PostgreSQL e Redis removidos: nao sao usados pela aplicacao.
#  Senhas e segredos carregados do arquivo .env (nunca hardcoded).
# ============================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-Radar Recife}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-false}
      # Em dev: ALLOWED_ORIGINS=* | Em producao: dominio Railway
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - CACHE_CLIMA_TTL=${CACHE_CLIMA_TTL:-300}
      - CACHE_ELNINO_TTL=${CACHE_ELNINO_TTL:-86400}
      - CACHE_MARINE_TTL=${CACHE_MARINE_TTL:-1800}
      - CACHE_NOTICIAS_TTL=${CACHE_NOTICIAS_TTL:-600}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
